[build]
  command = "npm install && npm run build && cp *.jpg *.webp thanks.html dist/ 2>/dev/null; true"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/login"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/app.html"
  status = 200
