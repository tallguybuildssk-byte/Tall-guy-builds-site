[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/login"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/app.html"
  status = 200

[[redirects]]
  from = "/dashboard/*"
  to = "/app.html"
  status = 200
